name: Coverage

on:
  workflow_call:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test --no-build --configuration Release --settings coverlet.runsettings --results-directory TestResults

      - name: Generate report and enforce threshold
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: 'Html;MarkdownSummaryGithub'
          customSettings: 'minimumCoverageThresholds:lineCoverage=80'

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coveragereport/

      - name: Check coverage thresholds
        shell: pwsh
        run: |
          $summaryFile = "coveragereport/SummaryGithub.md"
          if (-not (Test-Path $summaryFile)) {
            Write-Error "Summary file not found: $summaryFile"
            exit 1
          }
          
          $content = Get-Content $summaryFile -Raw
          
          # Extract overall line coverage from "| **Line coverage:** | XX% ..." pattern
          if ($content -match '\|\s*\*\*Line coverage:\*\*\s*\|\s*(\d+\.?\d*)%') {
            $lineCoverage = [double]$matches[1]
            Write-Output "Overall line coverage: $lineCoverage%"
            
            $minThreshold = 80
            if ($lineCoverage -lt 60) {
              Write-Error "Line coverage $lineCoverage% is below warning threshold of 60%"
              exit 1
            } elseif ($lineCoverage -lt $minThreshold) {
              Write-Warning "Line coverage $lineCoverage% is below target threshold of $minThreshold%"
            } else {
              Write-Output "✓ Line coverage meets target threshold of $minThreshold%"
            }
          } else {
            Write-Error "Could not parse line coverage from summary"
            exit 1
          }

      - name: Post coverage summary to PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: always() && github.event_name == 'pull_request'
        with:
          recreate: true
          path: coveragereport/SummaryGithub.md
