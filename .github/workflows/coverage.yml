name: Coverage

on:
  workflow_call:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test --no-build --configuration Release --settings coverlet.runsettings --results-directory TestResults

      - name: Generate report and enforce threshold
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: 'Html;MarkdownSummary'
          customSettings: 'minimumCoverageThresholds:lineCoverage=80'

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coveragereport/

      - name: Coverage summary for PR
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: 'TestResults/**/coverage.cobertura.xml'
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'
          fail_below_min: false

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
