name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    uses: ./.github/workflows/build.yml
    with:
      os: ${{ matrix.os }}

  coverage:
    permissions:
      pull-requests: write
    uses: ./.github/workflows/coverage.yml

  publish:
    needs: [build, coverage]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      dry-run: true
